<h2>Filter by House</h2>

<select [(ngModel)]="selectedHouse" (change)="onSelect()">
  <option value="">Select House</option>
  <option *ngFor="let h of houses" [value]="h">
    {{ h }}
  </option>
</select>

<div class="container">
  <div class="card" *ngFor="let c of characters">
    <img [src]="c.image" alt="{{ c.name }}">

    <div class="card-body">
      <h3>{{ c.name }}</h3>
      <p class="house" [ngClass]="c.house">{{ c.house }}</p>
    </div>
  </div>
</div>
